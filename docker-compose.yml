# ============================================================================
# PDF2Word Converter - Docker Compose 编排
# ============================================================================
#
# 启动所有服务:
#   docker-compose up -d
#
# 仅启动后端（不使用 nginx）:
#   docker-compose up -d app
#
# 查看日志:
#   docker-compose logs -f
#
# 停止:
#   docker-compose down
#
# ============================================================================

version: "3.9"

services:
  # --- 后端转换服务 ---
  app:
    build: .
    container_name: pdf2word-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - CONVERSION_TIMEOUT_SECONDS=${CONVERSION_TIMEOUT_SECONDS:-120}
      - FILE_EXPIRY_MINUTES=${FILE_EXPIRY_MINUTES:-60}
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-10}
      - LIBREOFFICE_PATH=${LIBREOFFICE_PATH:-soffice}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      - ALLOW_ALL_ORIGINS=${ALLOW_ALL_ORIGINS:-false}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-30}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - UPLOAD_RATE_LIMIT_REQUESTS=${UPLOAD_RATE_LIMIT_REQUESTS:-10}
      - UPLOAD_RATE_LIMIT_WINDOW_SECONDS=${UPLOAD_RATE_LIMIT_WINDOW_SECONDS:-60}
      - DOWNLOAD_RATE_LIMIT_REQUESTS=${DOWNLOAD_RATE_LIMIT_REQUESTS:-20}
      - DOWNLOAD_RATE_LIMIT_WINDOW_SECONDS=${DOWNLOAD_RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      # 持久化上传文件和转换结果
      - ./backend/uploads:/app/backend/uploads
      - ./backend/converted:/app/backend/converted
    networks:
      - pdf2word-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Nginx 反向代理（可选）---
  # 如果不需要 HTTPS 或反向代理，可以注释掉整个 nginx 服务
  nginx:
    image: nginx:stable-alpine
    container_name: pdf2word-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 挂载 nginx 配置（需要先替换 ${DOMAIN} 等占位符）
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt 证书（需要先申请证书）
      - ./certs:/etc/letsencrypt:ro
      # ACME 验证目录
      - ./certbot-webroot:/var/www/certbot
    depends_on:
      - app
    networks:
      - pdf2word-network

networks:
  pdf2word-network:
    driver: bridge
