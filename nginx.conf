# ============================================================================
# PDF2Word Converter - Nginx 反向代理配置（公网生产环境）
# ============================================================================
#
# 使用前请替换：
#   1. ${DOMAIN}   → 你的域名（如 pdf.example.com）
#   2. ${APP_PORT} → 后端服务端口（默认 8000）
#   3. SSL 证书路径（使用 Let's Encrypt 或自签证书）
#
# Let's Encrypt 证书申请（Ubuntu/Debian）:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d ${DOMAIN}
#
# ============================================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # --- SSL 证书（Let's Encrypt）---
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # --- SSL 安全配置 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS（仅 HTTPS 环境启用）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- 安全头 ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- 上传文件大小限制 ---
    client_max_body_size 100m;
    client_body_timeout 300s;

    # --- 日志 ---
    access_log /var/log/nginx/pdf2word_access.log;
    error_log  /var/log/nginx/pdf2word_error.log;

    # --- 反向代理到后端 ---
    location / {
        proxy_pass http://127.0.0.1:${APP_PORT};

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 超时配置（转换任务可能需要较长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # WebSocket 支持（可选）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓冲配置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 静态资源缓存（CSS/JS/图片）
    location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:${APP_PORT};
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
